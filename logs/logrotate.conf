# Logrotate configuration for Asset Management System
# 此配置檔由容器內的 cron 執行，路徑為容器內路徑

/app/logs/app/app.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 node node
    dateext
    dateformat -%Y%m%d
    copytruncate
    # copytruncate: 複製後清空原檔，而非 rename，避免 Node.js 寫入舊 inode
}

/app/logs/startup/startup-*.log {
    size 10M
    rotate 10
    compress
    missingok
    notifempty
    create 0644 node node
    dateext
    dateformat -%Y%m%d
    # startup logs 使用檔名時間戳，不需要 copytruncate
}

/app/logs/access/*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 node node
    dateext
    dateformat -%Y%m%d
    copytruncate
    # 未來如果實作 access log，使用 copytruncate 避免寫入問題
}
